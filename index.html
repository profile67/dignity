<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COCONUT SENTINEL | VIRUS SCANNER</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui-container {
            width: 80%;
            max-width: 800px;
            border: 1px solid #fff;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        #header {
            text-align: center;
            border-bottom: 1px solid #fff;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        #console {
            height: 300px;
            overflow-y: hidden;
            font-size: 12px;
            line-height: 1.4;
            color: #0f0; /* Classic Hacker Green */
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #222;
            margin: 20px 0;
            position: relative;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            transition: width 0.1s;
        }
        .status { color: #fff; font-weight: bold; }
        .critical { color: #ff0000; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="header">
        <h1>COCONUT SENTINEL v1.0</h1>
        <p>DEEP SCANNING FOR RATS, HACKTOOLS, AND MALWARE</p>
    </div>

    <div id="console"></div>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div id="footer">
        STATUS: <span id="status-text" class="status">INITIALIZING...</span>
    </div>
</div>

<script>
    const consoleBox = document.getElementById('console');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');

    const scanLogs = [
        "Initializing Coconut Kernel...",
        "Fetching local IP metadata...",
        "Scanning TCP/UDP Ports...",
        "Checking for 'QuasarRAT' signatures...",
        "Searching for 'DarkComet' registry keys...",
        "Analyzing browser headers for injections...",
        "Detecting keystroke logging hooks...",
        "Verifying SSL certificate integrity...",
        "Checking System32 for unauthorized .exe files...",
        "Scanning Roblox local storage for backdoors...",
        "Searching for 'Xeno' executor remnants...",
        "Isolating suspicious packets...",
        "Analyzing shellcode entropy...",
        "Coconut Firewall: ACTIVE",
        "Bypassing sandbox restrictions...",
        "Scanning for 'Blackbird' clan legacy threats...",
        "Scanning... [OBJECT: COCONUT_SHELL]",
        "Threat Level: LOW",
        "Checking for credential harvesters...",
        "Memory leak detected... Patching...",
        "Analyzing 'Average Plate Game' ban data..."
    ];

    // Generate hundreds of "junk" scan lines to reach your 600+ goal
    for(let i=0; i<600; i++) {
        scanLogs.push(`Scanning Block 0x${Math.floor(Math.random()*16777215).toString(16).toUpperCase()}... [CLEAN]`);
    }

    scanLogs.push("--- SCAN COMPLETE ---");
    scanLogs.push("NO VIRUSES DETECTED. SYSTEM IS SOVEREIGN.");

    let currentLine = 0;
    function runScan() {
        if (currentLine < scanLogs.length) {
            const line = document.createElement('div');
            line.textContent = `[ > ] ${scanLogs[currentLine]}`;
            
            // Randomly highlight "RATS" or "THREATS"
            if(scanLogs[currentLine].includes("RAT") || scanLogs[currentLine].includes("Detecting")) {
                line.className = "critical";
            }

            consoleBox.appendChild(line);
            consoleBox.scrollTop = consoleBox.scrollHeight;

            let progress = (currentLine / scanLogs.length) * 100;
            progressFill.style.width = progress + "%";
            statusText.textContent = `SCANNING... ${Math.round(progress)}%`;

            currentLine++;
            setTimeout(runScan, Math.random() * 50); // Random speed for realism
        } else {
            statusText.textContent = "SECURE. ALL COCONUTS PROTECTED.";
            statusText.style.color = "#0f0";
        }
    }

    setTimeout(runScan, 1000);
</script>

</body>
</html>
