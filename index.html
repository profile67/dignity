<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dignity | System Override</title>
    <style>
        body {
            background-color: #050505;
            color: #1e90ff; /* Sakura Blue */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal {
            border: 1px solid #1e90ff;
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.2);
            width: 400px;
        }

        .header {
            color: #ff4d4d; /* Annoyed Red */
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #ff4d4d;
            padding-bottom: 5px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            background: transparent;
            border: 1px solid #1e90ff;
            color: #1e90ff;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 10px;
        }

        button:hover {
            background: #1e90ff;
            color: #000;
            box-shadow: 0 0 10px #1e90ff;
        }

        .footer {
            margin-top: 20px;
            font-size: 8px;
            color: #555;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="header">STATUS: ANNOYED // ROLE: SAKURA</div>
        <div class="btn-grid">
            <button onclick="playAudio('13269140651')">Execute: FN_DEATH</button>
            <button onclick="playAudio('140481768844835')">Execute: SCP_096</button>
            <button onclick="playAudio('139668725303708')">Execute: METAL_PIPE</button>
            <button onclick="playAudio('80776947525537')">Execute: I_M_MEEN</button>
        </div>
        <div class="footer">LOG_ID: BLKBIRD-SOVEREIGN-BYPASS</div>
    </div>

    <script>
        function playAudio(assetId) {
            // Roblox Asset Delivery API Link
            const url = `https://www.roblox.com/asset-thumbnail/image?assetId=${assetId}&width=0&height=0&format=mp3`;
            
            // Note: Modern browsers often block direct Roblox audio links due to CORS.
            // If it doesn't play, you'll need to host the .mp3 files directly in your GitHub repo.
            const audio = new Audio(`https://assetdelivery.roblox.com/v1/asset/?id=${assetId}`);
            audio.play().catch(e => console.log("System block: Audio requires manual trigger or local hosting."));
        }
    </script>

</body>
</html>
