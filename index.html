<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - Managed by Blackbird Org</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        /* The "Managed" Header */
        #managed-bar {
            background: #202124;
            color: #fff;
            padding: 5px 20px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff0000; /* Hazard Red */
        }

        /* The Simulation Container */
        #browser-frame {
            width: 100%;
            height: calc(100% - 30px);
            border: none;
        }

        /* LINEWIZE MAX OVERLAY */
        #linewize-block {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            text-align: center;
            padding-top: 100px;
        }

        .block-card {
            width: 500px;
            margin: 0 auto;
            padding: 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .linewize-logo {
            color: #00b5ff;
            font-weight: bold;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .warning-text {
            color: #d93025;
            font-size: 24px;
            font-weight: bold;
        }

        .details {
            color: #5f6368;
            margin: 20px 0;
        }

        .user-info {
            background: #f1f3f4;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
        }

        #search-bar-sim {
            position: absolute;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            padding: 15px;
            border-radius: 30px;
            border: 1px solid #dfe1e5;
            outline: none;
            font-size: 16px;

<body>

<div id="managed-bar">

    <div style="text-align: center; margin-top: 150px;">
        <h1 style="font-size: 90px; font-family: 'Product Sans', Arial; color: #4285F4;">

<div id="linewize-block">
    <div class="block-card">
        <div class="linewize-logo">linewize</div>
        <div class="warning-text">Access Denied</div>

        <div class="user-info">

        <button onclick="resetSim()" style="margin-top: 30px; padding: 10px 20px; cursor: pointer;">Go Back</button>
    </div>
</div>

<script>
    // THE BLACKLIST LOGIC
    const blockedKeywords = ["roblox", "xeno", "executor", "unblock", "proxy", "vpn", "discord", "games"];

    function checkSearch(event) {
        if (event.key === "Enter") {
            const input = document.getElementById("search-bar-sim").value.toLowerCase();
            let isBlocked = false;

            blockedKeywords.forEach(word => {
                if (input.includes(word)) {
                    isBlocked = true;
                }
            });

            if (isBlocked) {
                // ACTIVATE THE CRANKED FILTER
                document.getElementById("linewize-block").style.display = "block";
            } else {
                alert("Site allowed... for now. Stay in your lane, Architect.");
            }
        }
    }

    function resetSim() {
        document.getElementById("linewize-block").style.display = "none";
        document.getElementById("search-bar-sim").value = "";
    }
</script>

</html>
