<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dignity | System Override</title>
    <style>
        body { background: #050505; color: #1e90ff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { border: 1px solid #1e90ff; padding: 30px; background: #000; box-shadow: 0 0 20px #1e90ff33; width: 350px; text-align: center; }
        .header { color: #ff4d4d; border-bottom: 1px solid #ff4d4d; margin-bottom: 20px; padding-bottom: 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button { background: transparent; border: 1px solid #1e90ff; color: #1e90ff; padding: 15px; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        button:hover { background: #1e90ff; color: #000; }
    </style>
</head>
<body onclick="document.getElementById('msg').innerText='SYSTEM ARMED'">

    <div class="terminal">
        <div class="header">FORCE_SAKURA // BYPASS_V5</div>
        <div class="grid">
            <button onclick="play('https://www.myinstants.com/media/sounds/fortnite-death-sound-effect-bit-depth-24-bit.mp3')">FN_DEATH</button>
            <button onclick="play('https://www.myinstants.com/media/sounds/scp-096-scream.mp3')">SCP_096</button>
            <button onclick="play('https://www.myinstants.com/media/sounds/metal-pipe-clang.mp3')">METAL_PIPE</button>
            <button onclick="play('https://www.myinstants.com/media/sounds/im-meen-book.mp3')">I_M_MEEN</button>
        </div>
        <div id="msg" style="margin-top:15px; font-size:9px; color:#444;">CLICK BACKGROUND TO ARM</div>
    </div>

    <script>
        function play(url) {
            const audio = new Audio(url);
            audio.play().catch(e => {
                console.log("Filter block detected. Trying alternative route...");
                // If MyInstants is blocked, we can't do much without hosting our own.
                alert("SYSTEM ERROR: Audio host blocked. Click background first or try at home.");
            });
        }
    </script>
</body>
</html>
