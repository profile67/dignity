<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACKBIRD.181BLUE | SOVEREIGN V7</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #ff0000; --bg: #000000; --glass: rgba(10, 10, 10, 0.85); --border: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        
        body, html { height: 100vh; width: 100vw; overflow: hidden; background: var(--bg); color: #fff; cursor: crosshair; }

        /* CIRCULAR RGB MOTION LIGHTS */
        .rgb-orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; background: conic-gradient(from 0deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); filter: blur(80px); opacity: 0.15; z-index: -1; animation: rotate 10s linear infinite; }
        .orb-1 { top: -10%; left: -10%; }
        .orb-2 { bottom: -10%; right: -10%; animation-direction: reverse; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* SCANLINE & OVERLAY */
        .vfx-scan { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 100; pointer-events: none; }

        /* LAYOUT */
        .main-wrapper { display: flex; height: 100vh; width: 100vw; padding: 20px; gap: 20px; }
        
        /* SIDEBAR (GLASS RGB) */
        .sidebar { width: 300px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: 15px; padding: 30px; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .logo { font-family: 'Syncopate'; font-size: 1rem; color: #fff; letter-spacing: 5px; margin-bottom: 40px; text-align: center; background: linear-gradient(90deg, #ff0000, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-btn { background: transparent; border: 1px solid transparent; color: #555; padding: 15px; margin-bottom: 10px; border-radius: 8px; text-align: left; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.03); color: #fff; border-color: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(255,0,0,0.1); }

        /* VIEWPORT */
        .viewport { flex-grow: 1; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); border-radius: 15px; padding: 40px; overflow-y: auto; position: relative; }
        .tab-content { display: none; flex-direction: column; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* RGB BORDERED CARDS */
        .card { background: rgba(0,0,0,0.4); border-radius: 12px; padding: 25px; border: 1px solid #111; position: relative; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: #ff0000; box-shadow: 0 0 30px rgba(255,0,0,0.1); }
        .card::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transition: 0.5s; }
        .card:hover::after { left: 100%; }

        /* INPUTS & BUTTONS */
        input, textarea { background: #050505; border: 1px solid #111; color: #fff; padding: 18px; border-radius: 8px; font-family: 'JetBrains Mono'; margin-top: 10px; outline: none; width: 100%; transition: 0.3s; }
        input:focus { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        
        .btn-rgb { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-rgb:hover { background: #ff0000; color: #fff; box-shadow: 0 0 30px #ff0000; transform: translateY(-2px); }

        /* STATS GRID */
        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .stat-item { text-align: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .stat-num { display: block; font-size: 1.5rem; font-weight: 700; color: #ff0000; font-family: 'JetBrains Mono'; }

        /* HEADSHOT CIRCLE */
        .pfp-ring { width: 130px; height: 130px; border-radius: 50%; padding: 4px; background: conic-gradient(#ff0000, #002bff, #ff0000); animation: rotate 3s linear infinite; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
        .pfp-inner { width: 100%; height: 100%; border-radius: 50%; background: #000; overflow: hidden; }
        #pfp { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="rgb-orb orb-1"></div>
    <div class="rgb-orb orb-2"></div>
    <div class="vfx-scan"></div>

    <div class="main-wrapper">
        <div class="sidebar">
            <div class="logo">BLACKBIRD.Y2K</div>
            <button class="nav-btn active" onclick="tab(event, 'h')">COMMAND CENTER</button>
            <button class="nav-btn" onclick="tab(event, 'e')">LUA EXECUTOR</button>
            <button class="nav-btn" onclick="tab(event, 'st')">ADMIN / FEEDBACK</button>
        </div>

        <div class="viewport">
            <div id="h" class="tab-content active">
                <div style="display: flex; gap: 40px; align-items: flex-start;">
                    <div>
                        <div class="pfp-ring"><div class="pfp-inner"><img id="pfp" src=""></div></div>
                        <h2 id="uDisplay" style="font-family: 'Syncopate'; font-size: 1.5rem;">GUEST</h2>
                        <p id="found" style="color: #00ff00; font-size: 0.6rem; display: none; margin-top: 5px;">[ STATUS: UPLINKED ]</p>
                    </div>
                    <div style="flex-grow: 1;">
                        <input type="text" id="uInput" placeholder="Enter System Username..." onkeyup="sync()">
                        <div class="grid-stats">
                            <div class="stat-item"><span class="stat-num" id="statVisits">0</span> VISITS</div>
                            <div class="stat-item"><span class="stat-num" id="statTime">0s</span> TIME</div>
                        </div>
                        <button class="btn-rgb" style="width: 100%; margin-top: 20px;" onclick="window.open('https://www.roblox.com/users/10583358597/profile')">SUPPORT SOVEREIGN (ROBUX)</button>
                    </div>
                </div>
            </div>

            <div id="e" class="tab-content">
                <h2 style="font-family: 'Syncopate'; margin-bottom: 20px;">LUA/LUAU CONSOLE</h2>
                <textarea id="editor" style="height: 350px;" placeholder="-- Load script payload..."></textarea>
                <button class="btn-rgb" onclick="runExec()">INJECT TO CLIENT</button>
            </div>

            <div id="st" class="tab-content">
                <h2 style="font-family: 'Syncopate'; margin-bottom: 20px;">SYSTEM FEEDBACK</h2>
                <textarea id="feedMsg" style="height: 100px;" placeholder="Report bug or suggest feature..."></textarea>
                <button class="btn-rgb" onclick="sendFeed()">SEND TO SERVER</button>
                
                <div id="adminBox" style="display:none; margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">
                    <h3 style="color: #ff0000; margin-bottom: 15px;">ADMIN FEEDBACK LOGS</h3>
                    <div id="adminList" style="font-family: 'JetBrains Mono'; font-size: 0.7rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function tab(e, id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function sync() {
            let u = document.getElementById('uInput').value;
            let d = document.getElementById('uDisplay');
            let f = document.getElementById('found');
            let p = document.getElementById('pfp');
            
            if(u.length > 2) {
                d.innerText = u.toUpperCase();
                p.src = `https://www.roblox.com/headshot-thumbnail/image?width=150&height=150&format=png&username=${u}`;
                f.style.display = 'block';

                if(u.toLowerCase() === "blackbirdy2k" || u.toLowerCase() === "thisnotxsploiting") {
                    document.getElementById('adminBox').style.display = 'block';
                    loadFeed();
                }
            }
        }

        // STATS LOGIC
        let v = parseInt(localStorage.getItem('bb_v') || 0);
        let t = parseInt(localStorage.getItem('bb_t') || 0);
        let x = parseInt(localStorage.getItem('bb_x') || 0);
        if(!sessionStorage.getItem('active')) { v++; localStorage.setItem('bb_v', v); sessionStorage.setItem('active', 'true'); }

        setInterval(() => {
            t++; localStorage.setItem('bb_t', t);
            document.getElementById('statVisits').innerText = v;
            document.getElementById('statTime').innerText = t + "S";
        }, 1000);

        function runExec() { x++; localStorage.setItem('bb_x', x); alert("Script Injected! Sessions Active."); }

        function sendFeed() {
            let m = document.getElementById('feedMsg').value;
            if(!m) return;
            let reports = JSON.parse(localStorage.getItem('bb_reports') || "[]");
            reports.push({ u: document.getElementById('uInput').value || "Guest", m: m });
            localStorage.setItem('bb_reports', JSON.stringify(reports));
            alert("Sent to Blackbird Database.");
            document.getElementById('feedMsg').value = "";
        }

        function loadFeed() {
            let reports = JSON.parse(localStorage.getItem('bb_reports') || "[]");
            document.getElementById('adminList').innerHTML = reports.map(r => `<div style="margin-bottom:10px; border-left:2px solid #ff0000; padding-left:10px;">[${r.u}]: ${r.m}</div>`).join('');
        }
    </script>
</body>
</html>
