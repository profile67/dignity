        }

        body {

            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;

            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;

        ::-webkit-scrollbar { display: none; }

        .container {
            border: 1px solid var(--sakura-blue);
            padding: 25px;
            background: rgba(0, 0, 0, 0.98);
            box-shadow: var(--glow);
            width: 80%;
            max-width: 900px;
            height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            border-bottom: 2px solid var(--annoyed-red);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            font-size: 18px;
            font-weight: bold;
            letter-spacing: 5px;
        }

        /* GRID SYSTEM FOR MASSIVE SOUNDS */
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            overflow-y: auto;
            padding-right: 10px;
        }

        button {
            background: transparent;
            border: 1px solid var(--sakura-blue);
            color: var(--sakura-blue);
            padding: 12px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.1s ease-in-out;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        button:hover {
            background: var(--sakura-blue);
            color: var(--void-black);
            box-shadow: 0 0 15px var(--sakura-blue);
        }

        .category-label {
            grid-column: span 4;
            color: #444;
            font-size: 10px;
            margin-top: 15px;
            border-bottom: 1px solid #222;
        }

        /* SCANLINE EFFECT */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(30, 144, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .footer-info {
            margin-top: auto;
            padding-top: 15px;
            font-size: 9px;
            color: #333;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
