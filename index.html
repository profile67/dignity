<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dignity | Sound Asset Terminal</title>
    <style>
        :root { --blue: #1e90ff; --red: #ff4d4d; --bg: #050505; }
        body { background: var(--bg); color: var(--blue); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .terminal {
            border: 2px solid var(--blue);
            width: 95%; height: 92vh;
            display: flex; flex-direction: column;
            background: rgba(0,0,0,0.98);
            padding: 15px; box-shadow: 0 0 40px rgba(30,144,255,0.2);
        }

        .header { font-weight: bold; color: var(--red); margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 12px; border-bottom: 1px solid var(--red); padding-bottom: 5px; }

        /* THE TUNNEL BOX */
        .nav { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; text-align: center; }
        .bypass-warning { color: #f1c40f; font-size: 10px; margin-bottom: 10px; letter-spacing: 1px; }

        /* THE VIEWPORT */
        .viewport { flex-grow: 1; border: 1px solid var(--blue); background: #fff; margin-bottom: 15px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* SFX PANEL */
        .sfx-label { font-size: 11px; color: var(--red); margin-bottom: 8px; font-weight: bold; }
        .sfx-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; height: 140px; overflow-y: auto; padding-top: 5px; }
        button { background: transparent; border: 1px solid var(--blue); color: var(--blue); font-size: 9px; cursor: pointer; padding: 10px; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        
        .panic { border-color: var(--red); color: var(--red); font-weight: bold; }
        .panic:hover { background: var(--red); color: #000; }
    </style>
</head>
<body onclick="init()">

    <div class="terminal">
        <div class="header">
            <span>SOVEREIGN_SYSTEM_v7 // BLACKBIRD_CLAN_LEADER</span>
            <span id="st">STB_WAITING...</span>
        </div>

        <div class="nav">
            <div class="bypass-warning">NOTICE: THIS TUNNEL ONLY SUPPORTS MYINSTANTS.COM // FIREWALL BYPASS ACTIVE</div>
            <button onclick="loadMyInstants()" style="width: 80%; padding: 12px; font-weight: bold;">INITIALIZE MYINSTANTS_TUNNEL</button>
            <button class="panic" onclick="location.href='https://en.wikipedia.org/wiki/Computer_science'" style="width: 15%;">PANIC</button>
        </div>

        <div class="viewport">
            <iframe id="tunnel" src="about:blank"></iframe>
        </div>

        <div class="sfx-label">EMERGENCY_SFX_OVERRIDE</div>
        <div class="sfx-grid">
            <button onclick="p('https://www.myinstants.com/media/sounds/jeffrey-epstein-versaillte-79968.mp3')">JEFFREY_E</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/my-mommy-said-no-more-skibidi-toilet-45304.mp3')">NO_SKIBIDI</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/metal-pipe-clang.mp3')">METAL_PIPE</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/vine-boom.mp3')">VINE_BOOM</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/scp-096-scream.mp3')">SCP_096</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/dance-till-youre-dead-full.mp3')">DANCE_DOG</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/nyan-cat.mp3')">NYAN_CAT</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/discord-notification.mp3')">DIS_PING</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/taco-bell-bong.mp3')">TACO_BELL</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/fart-with-reverb.mp3')">BASS_BOMB</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/roblox-death-sound_1.mp3')">OOF_V2</button>
            <button onclick="p('https://www.myinstants.com/media/sounds/error.mp3')">X_ERROR</button>
        </div>
    </div>

    <script>
        function init() {
            document.getElementById('st').innerText = 'STATUS: AUTHORIZED // TUNNEL_READY';
            document.getElementById('st').style.color = '#1e90ff';
        }

        function p(url) { new Audio(url).play(); }

        function loadMyInstants() {
            // This button forces the iframe to load MyInstants via the tunnel
            document.getElementById('tunnel').src = "https://www.myinstants.com/en/index/us/";
        }

        /* TECH_AWARD_STYLING_BUFFER
           -------------------------
           Validating Technology Award Credentials... [OK]
           User: Sakura

        */
        console.log("Terminal Ready for Monday.");
    </script>
</body>
</html>
