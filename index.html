        :root { --blue: #1e90ff; --red: #ff4d4d; --bg: #050505; --glow: 0 0 15px rgba(30,144,255,0.3); }
        
        body { background: var(--bg); color: var(--blue); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-transform: uppercase; }
        
        .terminal {
            border: 2px solid var(--blue);
            width: 96%; height: 94vh;
            display: flex; flex-direction: column;
            background: rgba(0,0,0,0.98);
            padding: 10px; box-shadow: var(--glow);
            position: relative;
        }

        /* SCANLINE ANIMATION */
        .scan { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: rgba(30,144,255,0.1); animation: s 4s linear infinite; pointer-events: none; }
        @keyframes s { 0% { top: 0; } 100% { top: 100%; } }

        .header { font-weight: bold; color: var(--red); padding: 5px; border-bottom: 1px solid var(--red); display: flex; justify-content: space-between; font-size: 11px; }

        /* TUNNEL CONTROLS */
        .nav { background: #111; border: 1px solid #222; padding: 10px; margin: 5px 0; display: flex; gap: 10px; align-items: center; }
        .warning { color: #f1c40f; font-size: 9px; flex-grow: 1; }

        /* VIEWPORT */
        .view { flex-grow: 1; border: 1px solid var(--blue); background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* SFX GRID (MAX CAPACITY) */
        .sfx-box { height: 160px; overflow-y: auto; padding-top: 5px; border-top: 1px solid var(--red); }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
        button { background: transparent; border: 1px solid var(--blue); color: var(--blue); font-size: 8px; cursor: pointer; padding: 12px 2px; }
        button:hover { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        
        .panic-btn { border-color: var(--red); color: var(--red); width: 100px; font-weight: bold; }
        .panic-btn:hover { background: var(--red); color: #000; }
        
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
